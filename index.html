<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diploma Studio Pro</title>

<style>
body {
    margin: 0;
    display: flex;
    font-family: Arial;
    background: #1e1e1e;
}

#panel {
    width: 340px;
    padding: 10px;
    background: #2b2b2b;
    color: white;
}

canvas {
    margin: 10px;
    background: white;
    border: 2px solid #444;
}

/* font preview */
.font-preview {
    font-size: 14px;
    margin: 5px 0;
    padding: 5px;
    background: #444;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="panel">
    <h3>Diploma Studio Pro</h3>

    <label>Background</label>
    <input type="color" id="bgColor" value="#ffffff">

    <label>Frame Style</label>
    <select id="frameStyle">
        <option value="classic">Classic Black</option>
        <option value="gold">Gold Ornate</option>
        <option value="minimal">Minimal Thin</option>
    </select>

    <hr>

    <button onclick="addText(false)">Add Normal Text</button>
    <button onclick="addText(true)">Add Headline</button>

    <hr>

    <label>Font Style</label>
    <select id="fontSelect">
        <option value="serif">Formal Serif</option>
        <option value="script">Connected Script</option>
        <option value="hand">Handwriting</option>
        <option value="modern">Modern Clean</option>
    </select>

    <hr>

    <label>Click text on canvas to edit</label>

    <button onclick="download()">Export PNG</button>
</div>

<canvas id="canvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let bgColor = "#fff";

let elements = [];
let selected = null;
let dragging = null;
let offsetX = 0;
let offsetY = 0;

// ---------- FONT MAP ----------
function getFont(type, isHeadline) {
    if (type === "serif") return (isHeadline ? "bold 36px Times New Roman" : "22px Times New Roman");
    if (type === "script") return (isHeadline ? "bold 40px cursive" : "24px cursive");
    if (type === "hand") return (isHeadline ? "bold 38px Comic Sans MS" : "22px Comic Sans MS");
    if (type === "modern") return (isHeadline ? "bold 36px Arial" : "22px Arial");
}

// ---------- ADD TEXT ----------
function addText(isHeadline) {
    const fontType = document.getElementById("fontSelect").value;

    elements.push({
        type: "text",
        text: isHeadline ? "HEADLINE" : "Your text here",
        x: 200,
        y: 200,
        fontType: fontType,
        isHeadline: isHeadline
    });
}

// ---------- DRAW FRAME ----------
function drawFrame() {
    const style = document.getElementById("frameStyle").value;

    ctx.lineWidth = 10;

    if (style === "classic") {
        ctx.strokeStyle = "#000";
    }

    if (style === "gold") {
        ctx.strokeStyle = "#c9a227";
        ctx.lineWidth = 14;
    }

    if (style === "minimal") {
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 4;
    }

    ctx.strokeRect(25, 25, canvas.width - 50, canvas.height - 50);
}

// ---------- DRAW ----------
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawFrame();

    for (let el of elements) {

        if (el.type === "text") {
            ctx.font = getFont(el.fontType, el.isHeadline);
            ctx.fillStyle = "black";
            ctx.fillText(el.text, el.x, el.y);
        }
    }

    requestAnimationFrame(draw);
}
draw();

// ---------- CLICK TO SELECT ----------
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    selected = null;

    for (let el of elements) {
        if (el.type === "text") {
            if (x > el.x && x < el.x + 300 && y > el.y - 30 && y < el.y) {
                selected = el;
                dragging = el;
                offsetX = x - el.x;
                offsetY = y - el.y;
            }
        }
    }

    if (selected) {
        const newText = prompt("Edit text:", selected.text);
        if (newText !== null) {
            selected.text = newText;
        }
    }
});

// ---------- DRAG ----------
canvas.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    const rect = canvas.getBoundingClientRect();
    dragging.x = e.clientX - rect.left - offsetX;
    dragging.y = e.clientY - rect.top - offsetY;
});

canvas.addEventListener("mouseup", () => dragging = null);

// ---------- BACKGROUND ----------
document.getElementById("bgColor").oninput = e => {
    bgColor = e.target.value;
};

// ---------- EXPORT ----------
function download() {
    const link = document.createElement("a");
    link.download = "diploma.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
