<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Diploma Studio Pro</title>
<style>
body {
    margin: 0;
    display: flex;
    font-family: Arial;
    background: #1e1e1e;
    color: white;
}

#panel {
    width: 320px;
    padding: 10px;
    background: #2b2b2b;
}

canvas {
    margin: 10px;
    border: 2px solid #444;
    background: white;
}
button, input {
    width: 100%;
    margin: 6px 0;
}
</style>
</head>
<body>

<div id="panel">
    <h3>Diploma Studio Pro</h3>

    <label>Background</label>
    <input type="color" id="bgColor" value="#ffffff">

    <label>Frame Color</label>
    <input type="color" id="frameColor" value="#000000">

    <button onclick="addText()">Add Text</button>

    <label>Upload Logo (animated)</label>
    <input type="file" id="logoUpload">

    <label>Upload Framed Image</label>
    <input type="file" id="imgUpload">

    <button onclick="downloadCanvas()">Export PNG</button>
</div>

<canvas id="canvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let bgColor = "#fff";
let frameColor = "#000";

let elements = [];
let dragging = null;
let offsetX = 0;
let offsetY = 0;

// ===== Animated logo =====
let logo = null;
let logoX = 50;
let logoY = 50;
let logoVX = 2;
let logoVY = 1.5;

// ===== UI =====
document.getElementById("bgColor").oninput = e => bgColor = e.target.value;
document.getElementById("frameColor").oninput = e => frameColor = e.target.value;

// ===== TEXT =====
function addText() {
    elements.push({
        type: "text",
        text: "Diploma Title",
        x: 200,
        y: 200,
        font: "30px Arial"
    });
}

// ===== LOGO UPLOAD (ANIMATED) =====
document.getElementById("logoUpload").onchange = function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt) {
        const img = new Image();
        img.onload = () => {
            logo = img;
        };
        img.src = evt.target.result;
    };

    reader.readAsDataURL(file);
};

// ===== IMAGE FRAME UPLOAD =====
document.getElementById("imgUpload").onchange = function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt) {
        const img = new Image();
        img.onload = () => {
            elements.push({
                type: "framedImage",
                x: 500,
                y: 200,
                w: 200,
                h: 250,
                img: img
            });
        };
        img.src = evt.target.result;
    };

    reader.readAsDataURL(file);
};

// ===== DRAW =====
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // outer frame
    ctx.strokeStyle = frameColor;
    ctx.lineWidth = 10;
    ctx.strokeRect(20,20,canvas.width-40,canvas.height-40);

    // elements
    for (let el of elements) {

        if (el.type === "text") {
            ctx.font = el.font;
            ctx.fillStyle = "black";
            ctx.fillText(el.text, el.x, el.y);
        }

        if (el.type === "framedImage") {
            // frame border
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.strokeRect(el.x, el.y, el.w, el.h);

            // clip image inside frame
            ctx.save();
            ctx.beginPath();
            ctx.rect(el.x, el.y, el.w, el.h);
            ctx.clip();

            ctx.drawImage(el.img, el.x, el.y, el.w, el.h);

            ctx.restore();
        }
    }

    // ===== ANIMATED LOGO =====
    if (logo) {
        ctx.drawImage(logo, logoX, logoY, 100, 80);

        logoX += logoVX;
        logoY += logoVY;

        // bounce
        if (logoX < 0 || logoX + 100 > canvas.width) logoVX *= -1;
        if (logoY < 0 || logoY + 80 > canvas.height) logoVY *= -1;
    }

    requestAnimationFrame(draw);
}
draw();

// ===== DRAG =====
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    for (let el of elements) {
        if (x > el.x && x < el.x + el.w && y > el.y && y < el.y + el.h) {
            dragging = el;
            offsetX = x - el.x;
            offsetY = y - el.y;
        }
    }
});

canvas.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();

    dragging.x = e.clientX - rect.left - offsetX;
    dragging.y = e.clientY - rect.top - offsetY;
});

canvas.addEventListener("mouseup", () => dragging = null);

// ===== EXPORT =====
function downloadCanvas() {
    const link = document.createElement("a");
    link.download = "diploma.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
